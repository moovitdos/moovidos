<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הורדת אפליקציית האוטובוסים</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-bg: #f8fafc;
            --card-bg: #ffffff;
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --text-main: #0f172a;
            --text-secondary: #475569;
            --border-light: #e2e8f0;
            --success-color: #059669;
            --badge-bg: #d1fae5;
            --shadow-soft: 0 10px 40px -10px rgba(0,0,0,0.08);
            --shadow-hover: 0 20px 40px -10px rgba(37, 99, 235, 0.15);
            --header-grad: linear-gradient(135deg, #ffffff 0%, #f1f5f9 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            transition: background-color 0.3s ease, border-color 0.3s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* אנימציות */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulseBtn {
            0% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(37, 99, 235, 0); }
            100% { box-shadow: 0 0 0 0 rgba(37, 99, 235, 0); }
        }

        .animate-up {
            animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        header {
            width: 100%;
            background: var(--header-grad);
            padding: 60px 20px 40px 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            border-bottom: 1px solid var(--border-light);
            position: relative;
        }

        .app-logo {
            width: 130px;
            height: 130px;
            border-radius: 30px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            margin-bottom: 25px;
            border: 4px solid var(--card-bg);
            object-fit: cover;
            background-color: var(--primary-bg);
            transition: transform 0.3s ease;
        }

        .app-logo:hover {
            transform: translateY(-5px);
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 10px;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto;
            font-weight: 300;
        }

        /* תגית סך כל ההורדות */
        .total-badge {
            display: inline-block;
            background: rgba(37, 99, 235, 0.08);
            color: var(--accent-color);
            padding: 10px 25px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1.15rem;
            margin-top: 25px;
            border: 1px solid rgba(37, 99, 235, 0.15);
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .container {
            width: 100%;
            max-width: 750px;
            padding: 50px 20px 0 20px;
            flex-grow: 1;
        }

        /* עיצוב עבור תוכן ה-README */
        .readme-section {
            background-color: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            box-shadow: var(--shadow-soft);
            margin-bottom: 40px;
            border: 1px solid var(--border-light);
            display: none; 
        }

        .readme-section h1, .readme-section h2, .readme-section h3 {
            color: var(--accent-color);
            margin-top: 25px;
            margin-bottom: 15px;
            font-weight: 700;
        }

        .readme-section h1:first-child { margin-top: 0; }
        .readme-section h1 { font-size: 2rem; border-bottom: 2px solid var(--border-light); padding-bottom: 10px;}
        .readme-section h2 { font-size: 1.6rem; }
        .readme-section p, .readme-section li {
            color: var(--text-main);
            font-size: 1.05rem;
        }

        .readme-section ul, .readme-section ol {
            margin-bottom: 20px;
            padding-right: 25px;
        }

        .readme-section li { margin-bottom: 8px; }

        /* כרטיס גרסה ראשית */
        .hero-card {
            background-color: var(--card-bg);
            border-radius: 28px;
            padding: 45px;
            text-align: center;
            box-shadow: var(--shadow-soft);
            margin-bottom: 50px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-light);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            scroll-margin-top: 20px; /* מרווח מלמעלה בזמן קפיצה לעוגן */
        }

        .hero-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        .hero-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, var(--accent-color), #38bdf8);
        }

        .badge-latest {
            display: inline-block;
            background-color: var(--badge-bg);
            color: var(--success-color);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 25px;
        }

        .version-title {
            font-size: 2.4rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .release-notes {
            background-color: var(--primary-bg);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 35px;
            text-align: right;
            font-size: 1rem;
            color: var(--text-secondary);
            border: 1px solid var(--border-light);
            white-space: pre-wrap;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: var(--accent-color);
            color: #ffffff !important;
            text-decoration: none;
            padding: 22px 40px;
            font-size: 1.3rem;
            font-weight: 700;
            border-radius: 16px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
            width: 100%;
            animation: pulseBtn 2.5s infinite;
        }

        .download-btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-3px);
            animation: none;
            box-shadow: 0 12px 30px rgba(37, 99, 235, 0.4);
        }

        .download-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 40px;
            padding-top: 35px;
            border-top: 1px solid var(--border-light);
        }

        .stat-box { text-align: center; }

        .stat-value {
            display: block;
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 5px;
            text-transform: uppercase;
            font-weight: 500;
        }

        /* רשימת גרסאות קודמות */
        .history-section {
            margin-bottom: 50px;
        }

        .history-section h3 {
            font-size: 1.6rem;
            margin-bottom: 25px;
            color: var(--text-main);
            font-weight: 700;
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .history-item {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 22px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid var(--border-light);
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .history-item:hover {
            transform: translateX(-5px);
            box-shadow: var(--shadow-soft);
            border-color: var(--accent-color);
        }

        .history-details strong {
            display: block;
            font-size: 1.2rem;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .history-details span {
            font-size: 0.95rem;
            color: var(--text-secondary);
        }

        .history-action {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .history-downloads {
            font-size: 0.9rem;
            color: var(--text-secondary);
            background-color: var(--primary-bg);
            padding: 6px 14px;
            border-radius: 20px;
            font-weight: 500;
        }

        .secondary-btn {
            background-color: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 10px 24px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            background-color: var(--accent-color);
            color: #ffffff !important;
        }

        /* אזור גלריית צילומי המסך */
        .gallery-section {
            width: 100%;
            background-color: transparent;
            padding: 20px 0 70px 0;
            overflow: hidden;
            display: none; 
        }

        .gallery-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--text-main);
            font-weight: 700;
        }

        .gallery-container {
            max-width: 1000px;
            margin: 0 auto;
            overflow-x: auto;
            white-space: nowrap;
            padding: 10px 20px 30px 20px;
            -webkit-overflow-scrolling: touch;
        }

        .gallery-container::-webkit-scrollbar { height: 10px; }
        .gallery-container::-webkit-scrollbar-thumb { background-color: var(--text-secondary); border-radius: 10px; }
        .gallery-container::-webkit-scrollbar-track { background-color: var(--border-light); border-radius: 10px; }

        .gallery-img {
            display: inline-block;
            height: 450px;
            margin-left: 20px;
            border-radius: 20px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-soft);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            object-fit: cover;
            background-color: var(--card-bg);
        }

        .gallery-img:last-child { margin-left: 0; }

        .gallery-img:hover {
            transform: scale(1.03) translateY(-5px);
            box-shadow: var(--shadow-hover);
        }

        /* כפתור צף להורדה */
        .fab-btn {
            position: fixed;
            bottom: 30px;
            left: 30px; /* ממוקם בצד שמאל למטה */
            background-color: var(--accent-color);
            color: #ffffff !important;
            padding: 16px 28px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.15rem;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 1000;
            transition: transform 0.3s ease, background-color 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            animation: fadeInUp 0.5s ease 1s forwards; /* מופיע עם עיכוב קל */
        }

        .fab-btn:hover {
            transform: translateY(-5px) scale(1.03);
            background-color: var(--accent-hover);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.5);
        }

        .fab-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .loading, .error {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
            color: var(--text-secondary);
            background-color: var(--card-bg);
            border-radius: 24px;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow-soft);
        }

        .error {
            color: #ef4444;
            background-color: #fef2f2;
            border-color: #fecaca;
        }

        footer {
            width: 100%;
            text-align: center;
            padding: 40px 20px 100px 20px; /* תוספת ריווח למטה שלא יסתיר את הכפתור הצף */
            color: var(--text-secondary);
            font-size: 1rem;
            border-top: 1px solid var(--border-light);
            background-color: var(--card-bg);
            margin-top: auto;
        }

        @media (max-width: 600px) {
            header { padding: 50px 20px 40px; }
            .app-logo { width: 100px; height: 100px; border-radius: 24px; }
            header h1 { font-size: 2.2rem; }
            .total-badge { font-size: 1rem; padding: 8px 20px; }
            .container { padding: 20px 15px 0; }
            .readme-section { padding: 30px 20px; }
            .hero-card { padding: 35px 20px; }
            .version-title { font-size: 2rem; }
            .download-btn { padding: 18px 20px; font-size: 1.15rem; }
            .stats-grid { grid-template-columns: 1fr; gap: 20px; }
            .stat-value { font-size: 1.4rem; }
            .history-item { flex-direction: column; align-items: flex-start; gap: 18px; padding: 20px; }
            .history-action { width: 100%; justify-content: space-between; }
            .gallery-img { height: 350px; }
            .fab-btn {
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%); /* ממרכז את הכפתור בנייד */
                width: 90%;
                justify-content: center;
            }
            .fab-btn:hover {
                transform: translateX(-50%) translateY(-3px);
            }
            @keyframes fadeInUp {
                from { opacity: 0; transform: translateY(30px) translateX(0); }
                to { opacity: 1; transform: translateY(0) translateX(0); }
            }
            /* התאמת האנימציה בנייד בגלל ה- translateX */
            .fab-btn {
                animation: mobileFabIn 0.5s ease 1s forwards;
            }
            @keyframes mobileFabIn {
                from { opacity: 0; transform: translateY(30px) translateX(-50%); }
                to { opacity: 1; transform: translateY(0) translateX(-50%); }
            }
        }
    </style>
</head>
<body>

    <header>
        <img src="logo.png" alt="סמל אפליקציית האוטובוסים" class="app-logo animate-up" onerror="this.style.display='none'">
        <h1 class="animate-up" style="animation-delay: 0.1s;">אפליקציית האוטובוסים</h1>
        <p class="animate-up" style="animation-delay: 0.2s;">זמני תחבורה ציבורית בזמן אמת, תכנון מסלול חכם ומידע מקיף - הכל במקום אחד.</p>
        
        <div class="total-badge animate-up" style="animation-delay: 0.3s;">
            סה"כ הורדות לאפליקציה: <span id="total-downloads-count">טוען...</span>
        </div>
    </header>

    <div class="container">
        <div id="readme-section" class="readme-section animate-up" style="animation-delay: 0.4s;"></div>

        <div id="download-section" class="animate-up" style="animation-delay: 0.5s;">
            <div id="content-area">
                <div class="loading">מתחבר לשרת ומאמת נתונים...</div>
            </div>
        </div>
    </div>

    <section class="gallery-section animate-up" id="gallery-section" style="animation-delay: 0.6s;">
        <h3 class="gallery-title">הצצה לאפליקציה</h3>
        <div class="gallery-container" id="gallery-container">
            </div>
    </section>

    <footer>
        <p>&copy; 2024 Moovitdos. כל הזכויות שמורות.</p>
        <p>האפליקציה מסופקת כפי שהיא (AS-IS) ללא אחריות.</p>
    </footer>

    <a href="#download-section" class="fab-btn">
        להורדת הגרסה האחרונה
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    </a>

    <script>
        // נתוני גיטהאב
        const username = 'moovitdos';
        const repo = 'moovidos';
        const releasesApiUrl = `https://api.github.com/repos/${username}/${repo}/releases`;
        const screenshotsApiUrl = `https://api.github.com/repos/${username}/${repo}/contents/screenshots`;
        const readmeRawUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/README.md`;

        function loadReadme() {
            fetch(readmeRawUrl)
                .then(response => {
                    if (!response.ok) throw new Error('README file not found');
                    return response.text();
                })
                .then(text => {
                    if (text.trim().length > 0) {
                        const readmeSection = document.getElementById('readme-section');
                        readmeSection.innerHTML = marked.parse(text);
                        readmeSection.style.display = 'block';
                    }
                })
                .catch(error => console.log('No README.md found.'));
        }

        function loadScreenshots() {
            fetch(screenshotsApiUrl)
                .then(response => {
                    if (!response.ok) throw new Error('No screenshots folder found');
                    return response.json();
                })
                .then(files => {
                    const imageFiles = files.filter(file => file.name.match(/\.(jpg|jpeg|png|gif|webp)$/i));
                    if (imageFiles.length > 0) {
                        const galleryContainer = document.getElementById('gallery-container');
                        const gallerySection = document.getElementById('gallery-section');
                        
                        imageFiles.forEach(file => {
                            const img = document.createElement('img');
                            img.src = file.download_url;
                            img.alt = file.name;
                            img.className = 'gallery-img';
                            galleryContainer.appendChild(img);
                        });
                        
                        gallerySection.style.display = 'block';
                    }
                })
                .catch(error => console.log('Screenshots folder not found.'));
        }

        function findApkAsset(assets) { return assets.find(asset => asset.name.endsWith('.apk')); }
        
        function formatDate(dateString) {
            return new Date(dateString).toLocaleDateString('he-IL', { year: 'numeric', month: 'long', day: 'numeric' });
        }

        function getFileSizeBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(1)) + ' ' + sizes[i];
        }

        fetch(releasesApiUrl)
            .then(response => {
                if (!response.ok) throw new Error('נכשל בניסיון למשוך נתונים מהשרת.');
                return response.json();
            })
            .then(releases => {
                const contentArea = document.getElementById('content-area');
                if (!releases || releases.length === 0) {
                    contentArea.innerHTML = '<div class="error">לא נמצאו גרסאות זמינות להורדה כרגע.</div>';
                    document.getElementById('total-downloads-count').innerText = "0";
                    return;
                }

                const validReleases = releases.filter(release => findApkAsset(release.assets) !== undefined);
                if (validReleases.length === 0) {
                    contentArea.innerHTML = '<div class="error">לא נמצאו קבצי התקנה (APK) תקפים בשרת.</div>';
                    document.getElementById('total-downloads-count').innerText = "0";
                    return;
                }

                // חישוב סך כל ההורדות מכל הגרסאות
                let totalDownloadsSum = 0;
                validReleases.forEach(release => {
                    const apk = findApkAsset(release.assets);
                    if(apk) {
                        totalDownloadsSum += apk.download_count;
                    }
                });
                // עדכון התגית בראש העמוד
                document.getElementById('total-downloads-count').innerText = totalDownloadsSum.toLocaleString();

                const latestRelease = validReleases[0];
                const latestApk = findApkAsset(latestRelease.assets);
                
                let html = `
                    <div class="hero-card">
                        <span class="badge-latest">הגרסה העדכנית והמומלצת ביותר</span>
                        <h2 class="version-title">${latestRelease.name || latestRelease.tag_name}</h2>
                        <div class="release-notes">${latestRelease.body || 'עדכון זה כולל שיפורי יציבות, ביצועים ותיקוני באגים.'}</div>
                        
                        <a href="${latestApk.browser_download_url}" class="download-btn">
                            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                            הורדה ישירה (APK, ${getFileSizeBytes(latestApk.size)})
                        </a>
                        
                        <div class="stats-grid">
                            <div class="stat-box">
                                <span class="stat-value">${latestApk.download_count.toLocaleString()}</span>
                                <span class="stat-label">הורדות לגרסה זו</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-value">${formatDate(latestRelease.published_at)}</span>
                                <span class="stat-label">תאריך שחרור</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-value" dir="ltr">${latestRelease.tag_name}</span>
                                <span class="stat-label">מספר גרסה</span>
                            </div>
                        </div>
                    </div>
                `;

                if (validReleases.length > 1) {
                    html += `
                        <div class="history-section">
                            <h3>היסטוריית גרסאות</h3>
                            <div class="history-list">
                    `;
                    for (let i = 1; i < validReleases.length; i++) {
                        const release = validReleases[i];
                        const apk = findApkAsset(release.assets);
                        html += `
                            <div class="history-item">
                                <div class="history-details">
                                    <strong dir="ltr">${release.name || release.tag_name}</strong>
                                    <span>שחרור: ${formatDate(release.published_at)}</span>
                                </div>
                                <div class="history-action">
                                    <span class="history-downloads">${apk.download_count.toLocaleString()} הורדות</span>
                                    <a href="${apk.browser_download_url}" class="secondary-btn">הורד גרסה זו</a>
                                </div>
                            </div>
                        `;
                    }
                    html += `</div></div>`;
                }

                contentArea.innerHTML = html;
            })
            .catch(error => {
                document.getElementById('content-area').innerHTML = `
                    <div class="error">
                        אירעה שגיאה בטעינת הנתונים.<br>
                        אנא ודא שאתה מחובר לאינטרנט ונסה לרענן את העמוד.<br>
                        <small dir="ltr">${error.message}</small>
                    </div>
                `;
                document.getElementById('total-downloads-count').innerText = "שגיאה";
            });

        loadReadme();
        loadScreenshots();
    </script>
</body>
