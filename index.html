<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הפתרון - אפליקציית התחבורה הציבורית לבעלי סים כשר</title>
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-bg: #f0f4f8;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.5);
            --accent-color: #2563eb;
            --accent-hover: #1d4ed8;
            --text-main: #0f172a;
            --text-secondary: #475569;
            --border-light: rgba(226, 232, 240, 0.8);
            --success-color: #059669;
            --badge-bg: rgba(209, 250, 229, 0.8);
            --shadow-soft: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            --shadow-premium: 0 20px 50px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Blobs */
        .bg-blobs {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            filter: blur(80px);
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            background: var(--accent-color);
            opacity: 0.15;
            animation: move 20s infinite alternate;
        }

        .blob-1 {
            width: 500px;
            height: 500px;
            top: -100px;
            right: -100px;
            background: #6366f1;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            bottom: -50px;
            left: -50px;
            background: #2563eb;
            animation-duration: 25s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            top: 40%;
            left: 20%;
            background: #38bdf8;
            animation-duration: 30s;
        }

        @keyframes move {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(100px, 100px) scale(1.2); }
        }

        /* Glass Utility */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-soft);
        }

        header {
            width: 100%;
            padding: 80px 20px 60px;
            text-align: center;
            position: relative;
        }

        .app-logo {
            width: 140px;
            height: 140px;
            border-radius: 32px;
            box-shadow: var(--shadow-premium);
            margin-bottom: 30px;
            border: 5px solid white;
            object-fit: cover;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1e293b 0%, #2563eb 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 15px;
            letter-spacing: -1px;
        }

        header p {
            font-size: 1.25rem;
            color: var(--text-secondary);
            max-width: 650px;
            margin: 0 auto;
            font-weight: 400;
        }

        .total-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: var(--accent-color);
            padding: 12px 28px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid var(--border-light);
        }

        .container {
            width: 100%;
            max-width: 850px;
            margin: 0 auto;
            padding: 20px;
            flex-grow: 1;
        }

        .readme-section {
            border-radius: 28px;
            padding: 40px;
            margin-bottom: 40px;
            display: none;
        }

        .hero-card {
            border-radius: 32px;
            padding: 50px;
            text-align: center;
            margin-bottom: 60px;
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hero-card:hover {
            transform: scale(1.01);
        }

        .badge-latest {
            background: var(--badge-bg);
            color: var(--success-color);
            padding: 10px 24px;
            border-radius: 100px;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 30px;
            display: inline-block;
        }

        .version-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 25px;
        }

        .release-notes {
            background: rgba(255, 255, 255, 0.5);
            padding: 30px;
            border-radius: 24px;
            margin-bottom: 40px;
            text-align: right;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 1.1rem;
        }

        .download-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: var(--accent-color);
            color: white !important;
            text-decoration: none;
            padding: 24px 50px;
            font-size: 1.4rem;
            font-weight: 700;
            border-radius: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.25);
            width: 100%;
        }

        .download-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-5px);
            box-shadow: 0 20px 45px rgba(37, 99, 235, 0.35);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 50px;
            padding-top: 40px;
            border-top: 1px solid var(--border-light);
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .history-section h3 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 30px;
        }

        .history-item {
            border-radius: 24px;
            padding: 25px 35px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            transition: all 0.2s ease;
        }

        .history-item:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.85);
        }

        .secondary-btn {
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 12px 28px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            transition: all 0.2s;
        }

        .secondary-btn:hover {
            background: var(--accent-color);
            color: white !important;
        }

        .gallery-section {
            padding: 60px 0 100px;
            display: none;
        }

        .gallery-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery-img {
            width: 100%;
            height: auto;
            border-radius: 30px;
            box-shadow: var(--shadow-premium);
            transition: transform 0.3s;
            object-fit: cover;
        }

        .gallery-img:hover { transform: scale(1.05); }

        footer {
            margin-top: auto;
            padding: 60px 20px;
            text-align: center;
            background: white;
            border-top: 1px solid var(--border-light);
            color: var(--text-secondary);
        }

        .fab-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            background: var(--accent-color);
            color: white !important;
            padding: 18px 32px;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
            box-shadow: 0 10px 30px rgba(37, 99, 235, 0.3);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .fab-btn:hover {
            transform: scale(1.05) translateY(-5px);
            background: var(--accent-hover);
        }

        /* Animation utilities */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .hero-card { padding: 30px 20px; }
            .stats-grid { grid-template-columns: 1fr; }
            .history-item { flex-direction: column; text-align: center; gap: 20px; }
            .fab-btn { width: 90%; left: 5%; bottom: 20px; justify-content: center; }
            .navbar { display: none; } /* Hide navbar on mobile or make it simpler */
        }

        /* Navbar Styling */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 2000;
            padding: 15px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            border-bottom: 1px solid var(--glass-border);
        }

        /* Integrated Badge next to text */
        .download-badge {
            display: none; 
            background: rgba(37, 99, 235, 0.08); /* Subtle blue tint */
            color: var(--accent-color) !important;
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 100px;
            font-weight: 700;
            margin-right: 6px; /* Space from the text */
            border: 1px solid rgba(37, 99, 235, 0.15);
            vertical-align: middle;
            transition: all 0.2s;
        }

        .nav-links a:hover .download-badge {
            background: var(--accent-color);
            color: white !important;
        }

        .navbar a {
            display: inline-flex;
            align-items: center;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            font-size: 1rem;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.2s;
        }

        .navbar a:hover {
            background: rgba(37, 99, 235, 0.1);
            color: var(--accent-color);
        }

        html {
            scroll-padding-top: 80px; /* Space for the fixed navbar */
        }
    </style>
</head>
<body>

    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="navbar glass">
        <div class="nav-links">
            <a href="#home">בית</a>
            <a href="#readme-section">מידע</a>
            <a href="#content-area">
                הורדה
                <span id="nav-total-chip" class="download-badge">...</span>
            </a>
            <a href="#gallery-section">גלריה</a>
        </div>
    </nav>

    <header id="home">
        <img src="logo.png" alt="לוגו אפליקציית האוטובוסים" class="app-logo">
        <h1 class="reveal">הפתרון - אפליקציית התחבורה הציבורית לבעלי סים כשר</h1>
        <p class="reveal">מידע בזמן אמת, וזמני הגעה - הכל בחוויה אחת חלקה.</p>
    </header>

    <div class="container">
        <div id="readme-section" class="readme-section glass reveal"></div>

        <div id="content-area">
            <div class="loading reveal" style="text-align: center; padding: 100px;">
                <svg width="50" height="50" viewBox="0 0 50 50" style="animation: spin 1s linear infinite;">
                    <circle cx="25" cy="25" r="20" fill="none" stroke="#2563eb" stroke-width="5" stroke-dasharray="31.4" />
                </svg>
                <style> @keyframes spin { to { transform: rotate(360deg); } } </style>
            </div>
        </div>
    </div>

    <section class="gallery-section reveal" id="gallery-section">
        <h3 style="text-align:center; font-size: 2rem; margin-bottom: 40px;">הצצה לאפליקציה</h3>
        <div class="gallery-container" id="gallery-container"></div>
    </section>

    <footer>
        <p>כל הזכויות שמורות</p>
    </footer>

    <a href="#content-area" class="fab-btn">
        <span>הורד עכשיו</span>
        <svg fill="currentColor" width="24" height="24" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
    </a>

    <script>
        const username = 'moovitdos';
        const repo = 'moovidos';
        const releasesApiUrl = `https://api.github.com/repos/${username}/${repo}/releases`;
        const screenshotsApiUrl = `https://api.github.com/repos/${username}/${repo}/contents/screenshots`;
        const readmeRawUrl = `https://raw.githubusercontent.com/${username}/${repo}/main/README.md`;

        function loadReadme() {
            fetch(readmeRawUrl)
                .then(r => r.text())
                .then(text => {
                    if (text.trim()) {
                        const section = document.getElementById('readme-section');
                        section.innerHTML = marked.parse(text);
                        section.style.display = 'block';
                        section.classList.add('active');
                    }
                }).catch(() => {});
        }

        function loadScreenshots() {
            fetch(screenshotsApiUrl)
                .then(r => r.json())
                .then(files => {
                    const images = files.filter(f => f.name.match(/\.(jpg|jpeg|png|webp)$/i));
                    if (images.length) {
                        const container = document.getElementById('gallery-container');
                        images.forEach(f => {
                            const img = document.createElement('img');
                            img.src = f.download_url;
                            img.className = 'gallery-img';
                            container.appendChild(img);
                        });
                        document.getElementById('gallery-section').style.display = 'block';
                        document.getElementById('gallery-section').classList.add('active');
                    }
                }).catch(() => {});
        }

        function findApk(assets) { return assets.find(a => a.name.endsWith('.apk')); }
        function formatDate(d) { return new Date(d).toLocaleDateString('he-IL', { year: 'numeric', month: 'long', day: 'numeric' }); }
        function formatSize(b) {
            const i = Math.floor(Math.log(b) / Math.log(1024));
            return (b / Math.pow(1024, i)).toFixed(1) * 1 + ' ' + ['B', 'KB', 'MB', 'GB'][i];
        }

        fetch(releasesApiUrl)
            .then(r => r.json())
            .then(releases => {
                const area = document.getElementById('content-area');
                const valid = releases.filter(r => findApk(r.assets));
                
                if (!valid.length) {
                    area.innerHTML = `
                        <div class="hero-card glass reveal active" style="margin-top: 40px; padding: 60px 40px;">
                            <div style="margin-bottom: 25px;">
                                <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="var(--accent-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="animation: pulse 2s infinite;">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <polyline points="12 6 12 12 16 14"></polyline>
                                </svg>
                            </div>
                            <h2 class="version-title" style="margin-bottom: 35px;">בקרוב מאוד</h2>
                            <div class="download-btn" style="opacity: 0.3; cursor: not-allowed; background: #94a3b8; box-shadow: none;">
                                הורדה לא זמינה כעת
                            </div>
                        </div>
                        <style>
                            @keyframes pulse {
                                0% { transform: scale(1); opacity: 1; }
                                50% { transform: scale(1.1); opacity: 0.7; }
                                100% { transform: scale(1); opacity: 1; }
                            }
                        </style>
                    `;
                    return;
                }

                let total = 0;
                valid.forEach(r => {
                    const a = findApk(r.assets);
                    if (a) total += a.download_count;
                });
                
                const chip = document.getElementById('nav-total-chip');
                if (chip) {
                    chip.innerText = total.toLocaleString();
                    chip.style.display = 'inline-block';
                }


                const latest = valid[0];
                const apk = findApk(latest.assets);

                let html = `
                    <div class="hero-card glass reveal active">
                        <span class="badge-latest">הגרסה האחרונה</span>
                        <h2 class="version-title">${latest.name || latest.tag_name}</h2>
                        <div class="release-notes">${(latest.body || 'שיפורי ביצועים ושינויים פנימיים.').replace('### מה התחדש בגרסה זו?', 'מה חדש?').replace('### מה חדש?', 'מה חדש?')}</div>
                        <a href="${apk.browser_download_url}" class="download-btn">
                            הורדה ישירה (${formatSize(apk.size)})
                        </a>
                        <div class="stats-grid">
                            <div class="stat-box">
                                <span class="stat-value">${apk.download_count.toLocaleString()}</span>
                                <span class="stat-label">הורדות</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-value">${formatDate(latest.published_at)}</span>
                                <span class="stat-label">פורסם ב</span>
                            </div>
                            <div class="stat-box">
                                <span class="stat-value" dir="ltr">${latest.tag_name}</span>
                                <span class="stat-label">גרסה</span>
                            </div>
                        </div>
                    </div>
                `;

                if (valid.length > 1) {
                    html += `<div class="history-section reveal active"><h3>גרסאות קודמות</h3>`;
                    valid.slice(1, 5).forEach(r => {
                        const a = findApk(r.assets);
                        html += `
                            <div class="history-item glass">
                                <div>
                                    <strong dir="ltr">${r.name || r.tag_name}</strong>
                                    <small>${formatDate(r.published_at)}</small>
                                </div>
                                <a href="${a.browser_download_url}" class="secondary-btn">הורדה</a>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }

                area.innerHTML = html;
            })
            .catch(error => {
                document.getElementById('content-area').innerHTML = `
                    <div class="error">
                        אירעה שגיאה בטעינת הנתונים.<br>
                        אנא ודא שאתה מחובר לאינטרנט ונסה לרענן את העמוד.<br>
                        <small dir="ltr">${error.message}</small>
                    </div>
                `;

            });

        // Entrance animations
        window.addEventListener('scroll', () => {
            document.querySelectorAll('.reveal').forEach(el => {
                if (el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add('active');
            });
        });
        window.onload = () => {
            document.querySelectorAll('header .reveal').forEach((el, i) => {
                setTimeout(() => el.classList.add('active'), i * 150);
            });
            loadReadme();
            loadScreenshots();
        };
    </script>
</body>

</html>
